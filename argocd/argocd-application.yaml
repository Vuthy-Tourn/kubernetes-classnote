apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
 name: springboot-app
 namespace: argocd
spec:
 project: default
 source:
   repoURL: https://github.com/Vuthy-Tourn/argocd-gitops.git
   targetRevision: HEAD
   path: ./springboot-chart
   helm:                            
      valueFiles:
        - values-prod.yaml  

 # which cluster you planning to deploy !   
 destination:
   namespace: default
   server: https://kubernetes.default.svc
 syncPolicy:
   automated:
     prune: true
     selfHeal: true
   syncOptions:
     - Validate=false